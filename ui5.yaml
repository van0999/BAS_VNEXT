# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: walkthrough
type: application
server:
  customMiddleware:
    # - name: fiori-tools-proxy
    #   afterMiddleware: compression
    #   configuration:
    #     ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
    #     ui5:
    #       path:
    #         - /resources
    #         - /test-resources
    #       url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    # - name: ui5-middleware-simpleproxy
    #   afterMiddleware: compression
    #   configuration:
    #     ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
    #     backend:     
    #       - path: /sap
    #         url: https://my422346.s4hana.cloud.sap
    #       - scp: false
    #     ui5:
    #       # ← Phần này đang bị thiếu
    #       path:
    #         - /resources
    #         - /test-resources
    #       url: https://ui5.sap.com
          # version: null
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        backend:           
          - path: /sap
            url: https://my422346.s4hana.cloud.sap:443
            client: '080'
        ui5:
          # ← Phần này đang bị thiếu
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
          # version: null